<!DOCTYPE html>
<html>
  <head>
    <title>Carousel Hero Quicklinks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header></header>
    <main>
      <div>
        <div class="carousel-hero">
          <div>
            <div><picture><img src="https://picsum.photos/1440/500" alt="Slide one"></picture></div>
            <div><h1>A card that says yes to you.</h1><p>No salary slip? No credit score?</p></div>
            <div><a href="#">Check eligibility</a></div>
            <div>light</div>
          </div>
          <div>
            <div><picture><img src="https://picsum.photos/1440/501" alt="Slide two"></picture></div>
            <div><h1>Second slide</h1></div>
            <div><a href="#">Learn more</a></div>
            <div>light</div>
          </div>
          <div data-aue-model="carousel-hero-quicklink">
            <div><picture><img src="https://picsum.photos/40" alt="Savings"></picture></div>
            <div><a href="/savings">Savings Account</a></div>
          </div>
          <div data-aue-model="carousel-hero-quicklink">
            <div><picture><img src="https://picsum.photos/41" alt="Card"></picture></div>
            <div><a href="/cards">Recommended Credit Card</a></div>
          </div>
          <div data-aue-model="carousel-hero-quicklink">
            <div><picture><img src="https://picsum.photos/42" alt="Tracker"></picture></div>
            <div><a href="/tracker">Tracker</a></div>
          </div>
          <div data-aue-model="carousel-hero-quicklink">
            <div><picture><img src="https://picsum.photos/43" alt="Loans"></picture></div>
            <div><a href="/loans">Loans</a></div>
          </div>
          <div data-aue-model="carousel-hero-quicklink">
            <div><picture><img src="https://picsum.photos/44" alt="Investment"></picture></div>
            <div><a href="/investment">Investment</a></div>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
